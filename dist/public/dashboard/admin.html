<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Sweet Layers</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2A6B52; --primary-dark: #1F4A3A; --primary-light: #E8F5F0;
      --accent: #C4A647; --accent-dark: #B3941A;
      --cream: #FDF9F5; --brown: #3D2E22; --brown-light: #5A4535;
      --gray-100: #F5EDE4; --gray-200: #E8DCD0; --gray-300: #D4C4B5;
      --gray-400: #B8A08A; --gray-500: #9A7D6A; --white: #ffffff;
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
      --shadow-md: 0 4px 16px rgba(13,42,34,0.08);
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--cream);
      color: var(--brown);
      line-height: 1.5;
    }
    .dashboard-layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: var(--primary);
      color: var(--white);
      padding: 24px;
    }
    .sidebar-header {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-item {
      display: block;
      padding: 12px 16px;
      color: var(--white);
      text-decoration: none;
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      transition: background 0.2s;
    }
    .nav-item:hover, .nav-item.active {
      background: var(--primary-dark);
    }
    .main-content {
      padding: 32px;
    }
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .dashboard-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    .tenant-badge {
      background: var(--primary-light);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--white);
      padding: 24px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
    }
    .stat-card h3 {
      font-size: 0.875rem;
      color: var(--gray-500);
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
    }
    .content-section {
      background: var(--white);
      padding: 24px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      margin-bottom: 24px;
    }
    .content-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      margin-bottom: 20px;
    }
    .order-list {
      display: grid;
      gap: 16px;
    }
    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: var(--gray-100);
      border-radius: var(--radius-sm);
    }
    .order-info h4 {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .order-info p {
      font-size: 0.875rem;
      color: var(--gray-500);
    }
    .order-status {
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .order-status.pending {
      background: #FEF3C7;
      color: #92400E;
    }
    .order-status.processing {
      background: #DBEAFE;
      color: #1E40AF;
    }
    .order-status.completed {
      background: #D1FAE5;
      color: #065F46;
    }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary {
      background: var(--primary);
      color: var(--white);
    }
    .btn-primary:hover {
      background: var(--primary-dark);
    }
  </style>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        🍰 Sweet Layers
      </div>
      <nav>
        <a href="#" class="nav-item active">Dashboard</a>
        <a href="#" class="nav-item">Products</a>
        <a href="#" class="nav-item">Orders</a>
        <a href="#" class="nav-item">Customers</a>
        <a href="#" class="nav-item">Analytics</a>
        <a href="#" class="nav-item">Settings</a>
        <a href="#" class="nav-item" onclick="logout()">Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="dashboard-header">
        <h1>Admin Dashboard</h1>
        <div class="user-info">
          <span class="tenant-badge" id="tenantName">Shop Name</span>
          <div class="user-avatar" id="userAvatar">A</div>
          <div>
            <div id="userName">Admin</div>
            <div style="font-size: 0.875rem; color: var(--gray-500);">Shop Administrator</div>
          </div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <h3>Total Orders</h3>
          <div class="value" id="totalOrders">0</div>
        </div>
        <div class="stat-card">
          <h3>Total Revenue</h3>
          <div class="value" id="totalRevenue">฿0</div>
        </div>
        <div class="stat-card">
          <h3>Products</h3>
          <div class="value" id="totalProducts">0</div>
        </div>
        <div class="stat-card">
          <h3>Customers</h3>
          <div class="value" id="totalCustomers">0</div>
        </div>
      </div>

      <div class="content-section">
        <h2>Recent Orders</h2>
        <div class="order-list" id="orderList">
          <div class="order-item">
            <div class="order-info">
              <h4>Loading orders...</h4>
            </div>
          </div>
        </div>
      </div>

      <div class="content-section">
        <h2>Quick Actions</h2>
        <div style="display: flex; gap: 16px; flex-wrap: wrap;">
          <button class="btn btn-primary" onclick="addProduct()">Add Product</button>
          <button class="btn btn-primary" onclick="viewOrders()">View All Orders</button>
          <button class="btn btn-primary" onclick="viewCustomers()">View Customers</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api-client.js"></script>
  <script>
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      loadDashboardData();
    });

    function checkAuth() {
      const token = localStorage.getItem('auth_token');
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      const tenant = JSON.parse(localStorage.getItem('tenant') || '{}');
      
      if (!token || user.role !== 'admin') {
        window.location.href = '/login.html';
        return;
      }

      // Update user info
      document.getElementById('userName').textContent = user.name;
      document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
      document.getElementById('tenantName').textContent = tenant.name || 'Shop Name';
    }

    async function loadDashboardData() {
      const token = localStorage.getItem('auth_token');
      const tenant = JSON.parse(localStorage.getItem('tenant') || '{}');
      
      try {
        // Load products
        const productsResponse = await fetch('/api/products', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const productsData = await productsResponse.json();
        
        if (productsData.products) {
          document.getElementById('totalProducts').textContent = productsData.count || 0;
        }

        // Load users
        const usersResponse = await fetch(`/admin/users?tenantId=${tenant.id}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const usersData = await usersResponse.json();
        
        if (usersData.success) {
          document.getElementById('totalCustomers').textContent = usersData.count;
        }

        // Mock data for orders and revenue
        document.getElementById('totalOrders').textContent = '156';
        document.getElementById('totalRevenue').textContent = '฿89,450';
        
        // Render mock orders
        renderOrders([
          { id: 'ORD-001', customer: 'John Doe', total: 450, status: 'completed' },
          { id: 'ORD-002', customer: 'Jane Smith', total: 890, status: 'processing' },
          { id: 'ORD-003', customer: 'Bob Johnson', total: 320, status: 'pending' },
        ]);

      } catch (error) {
        console.error('Failed to load dashboard data:', error);
      }
    }

    function renderOrders(orders) {
      const orderList = document.getElementById('orderList');
      
      orderList.innerHTML = orders.map(order => `
        <div class="order-item">
          <div class="order-info">
            <h4>${order.id} - ${order.customer}</h4>
            <p>฿${order.total}</p>
          </div>
          <span class="order-status ${order.status}">${order.status}</span>
        </div>
      `).join('');
    }

    function addProduct() {
      window.location.href = '/admin/products.html';
    }

    function viewOrders() {
      window.location.href = '/admin/orders.html';
    }

    function viewCustomers() {
      window.location.href = '/admin/customers.html';
    }

    function logout() {
      localStorage.removeItem('auth_token');
      localStorage.removeItem('user');
      localStorage.removeItem('tenant');
      window.location.href = '/login.html';
    }
  </script>
</body>
</html>
