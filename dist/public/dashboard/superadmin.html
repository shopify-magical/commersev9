<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superadmin Dashboard - Sweet Layers Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2A6B52; --primary-dark: #1F4A3A; --primary-light: #E8F5F0;
      --accent: #C4A647; --accent-dark: #B3941A;
      --cream: #FDF9F5; --brown: #3D2E22; --brown-light: #5A4535;
      --gray-100: #F5EDE4; --gray-200: #E8DCD0; --gray-300: #D4C4B5;
      --gray-400: #B8A08A; --gray-500: #9A7D6A; --white: #ffffff;
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
      --shadow-md: 0 4px 16px rgba(13,42,34,0.08);
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--cream);
      color: var(--brown);
      line-height: 1.5;
    }
    .dashboard-layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: var(--primary);
      color: var(--white);
      padding: 24px;
    }
    .sidebar-header {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-item {
      display: block;
      padding: 12px 16px;
      color: var(--white);
      text-decoration: none;
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      transition: background 0.2s;
    }
    .nav-item:hover, .nav-item.active {
      background: var(--primary-dark);
    }
    .main-content {
      padding: 32px;
    }
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .dashboard-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--white);
      padding: 24px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
    }
    .stat-card h3 {
      font-size: 0.875rem;
      color: var(--gray-500);
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
    }
    .content-section {
      background: var(--white);
      padding: 24px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      margin-bottom: 24px;
    }
    .content-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      margin-bottom: 20px;
    }
    .tenant-list {
      display: grid;
      gap: 16px;
    }
    .tenant-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: var(--gray-100);
      border-radius: var(--radius-sm);
    }
    .tenant-info h4 {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .tenant-info p {
      font-size: 0.875rem;
      color: var(--gray-500);
    }
    .tenant-status {
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .tenant-status.active {
      background: #D1FAE5;
      color: #065F46;
    }
    .tenant-status.pending {
      background: #FEF3C7;
      color: #92400E;
    }
    .tenant-status.suspended {
      background: #FEE2E2;
      color: #991B1B;
    }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary {
      background: var(--primary);
      color: var(--white);
    }
    .btn-primary:hover {
      background: var(--primary-dark);
    }
    .btn-danger {
      background: #EF4444;
      color: var(--white);
    }
  </style>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        🍰 Sweet Layers
      </div>
      <nav>
        <a href="#" class="nav-item active">Dashboard</a>
        <a href="#" class="nav-item">Tenants</a>
        <a href="#" class="nav-item">Users</a>
        <a href="#" class="nav-item">Analytics</a>
        <a href="#" class="nav-item">Settings</a>
        <a href="#" class="nav-item" onclick="logout()">Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="dashboard-header">
        <h1>Superadmin Dashboard</h1>
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">SA</div>
          <div>
            <div id="userName">Super Admin</div>
            <div style="font-size: 0.875rem; color: var(--gray-500);">Platform Owner</div>
          </div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <h3>Total Tenants</h3>
          <div class="value" id="totalTenants">0</div>
        </div>
        <div class="stat-card">
          <h3>Total Users</h3>
          <div class="value" id="totalUsers">0</div>
        </div>
        <div class="stat-card">
          <h3>Total Orders</h3>
          <div class="value" id="totalOrders">0</div>
        </div>
        <div class="stat-card">
          <h3>Revenue</h3>
          <div class="value" id="totalRevenue">฿0</div>
        </div>
      </div>

      <div class="content-section">
        <h2>Tenant Management</h2>
        <div class="tenant-list" id="tenantList">
          <div class="tenant-item">
            <div class="tenant-info">
              <h4>Loading tenants...</h4>
            </div>
          </div>
        </div>
      </div>

      <div class="content-section">
        <h2>Quick Actions</h2>
        <div style="display: flex; gap: 16px; flex-wrap: wrap;">
          <button class="btn btn-primary" onclick="createNewTenant()">Create New Tenant</button>
          <button class="btn btn-primary" onclick="viewAllUsers()">View All Users</button>
          <button class="btn btn-primary" onclick="generateReport()">Generate Report</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api-client.js"></script>
  <script>
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      loadDashboardData();
    });

    function checkAuth() {
      const token = localStorage.getItem('auth_token');
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      
      if (!token || user.role !== 'superadmin') {
        window.location.href = '/login.html';
        return;
      }

      // Update user info
      document.getElementById('userName').textContent = user.name;
      document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
    }

    async function loadDashboardData() {
      const token = localStorage.getItem('auth_token');
      
      try {
        // Load tenants
        const tenantsResponse = await fetch('/admin/tenants', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const tenantsData = await tenantsResponse.json();
        
        if (tenantsData.success) {
          document.getElementById('totalTenants').textContent = tenantsData.count;
          renderTenants(tenantsData.tenants);
        }

        // Load users
        const usersResponse = await fetch('/admin/users', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const usersData = await usersResponse.json();
        
        if (usersData.success) {
          document.getElementById('totalUsers').textContent = usersData.count;
        }

        // Load orders (mock for now)
        document.getElementById('totalOrders').textContent = '1,234';
        document.getElementById('totalRevenue').textContent = '฿2,345,678';

      } catch (error) {
        console.error('Failed to load dashboard data:', error);
      }
    }

    function renderTenants(tenants) {
      const tenantList = document.getElementById('tenantList');
      
      if (tenants.length === 0) {
        tenantList.innerHTML = `
          <div class="tenant-item">
            <div class="tenant-info">
              <h4>No tenants yet</h4>
              <p>Create your first tenant to get started</p>
            </div>
          </div>
        `;
        return;
      }

      tenantList.innerHTML = tenants.map(tenant => `
        <div class="tenant-item">
          <div class="tenant-info">
            <h4>${tenant.name}</h4>
            <p>${tenant.domain} • ${tenant.subscription.plan} plan</p>
          </div>
          <div>
            <span class="tenant-status ${tenant.status}">${tenant.status}</span>
            <button class="btn btn-primary" style="margin-left: 8px;" onclick="viewTenant('${tenant.id}')">View</button>
          </div>
        </div>
      `).join('');
    }

    function createNewTenant() {
      alert('Create new tenant functionality - to be implemented');
    }

    function viewAllUsers() {
      alert('View all users functionality - to be implemented');
    }

    function generateReport() {
      alert('Generate report functionality - to be implemented');
    }

    function viewTenant(tenantId) {
      alert(`View tenant ${tenantId} - to be implemented`);
    }

    function logout() {
      localStorage.removeItem('auth_token');
      localStorage.removeItem('user');
      localStorage.removeItem('tenant');
      window.location.href = '/login.html';
    }
  </script>
</body>
</html>
