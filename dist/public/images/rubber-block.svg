<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="blockFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
    <linearGradient id="blockTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#718096"/>
      <stop offset="100%" style="stop-color:#4a5568"/>
    </linearGradient>
    <linearGradient id="blockSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d3748"/>
      <stop offset="100%" style="stop-color:#1a202c"/>
    </linearGradient>
    <filter id="blockShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <g filter="url(#blockShadow)">
    <!-- 3D Rubber Block - Isometric View -->
    <!-- Top Face -->
    <path d="M100 30 L160 65 L100 100 L40 65 Z" fill="url(#blockTop)" stroke="#2d3748" stroke-width="1"/>
    
    <!-- Left Face -->
    <path d="M40 65 L40 135 L100 170 L100 100 Z" fill="url(#blockSide)" stroke="#1a202c" stroke-width="1"/>
    
    <!-- Right Face -->
    <path d="M100 100 L100 170 L160 135 L160 65 Z" fill="url(#blockFront)" stroke="#2d3748" stroke-width="1"/>
  </g>
  
  <!-- Rubber Block Texture -->
  <g stroke="#4a5568" stroke-width="0.5" opacity="0.3">
    <line x1="45" y1="75" x2="95" y2="105"/>
    <line x1="50" y1="85" x2="95" y2="112"/>
    <line x1="45" y1="95" x2="95" y2="125"/>
    <line x1="50" y1="105" x2="95" y2="137"/>
    <line x1="45" y1="115" x2="95" y2="147"/>
    <line x1="50" y1="125" x2="95" y2="157"/>
    
    <line x1="105" y1="105" x2="155" y2="75"/>
    <line x1="105" y1="112" x2="150" y2="85"/>
    <line x1="105" y1="125" x2="155" y2="95"/>
    <line x1="105" y1="137" x2="150" y2="105"/>
    <line x1="105" y1="147" x2="155" y2="115"/>
    <line x1="105" y1="157" x2="150" y2="125"/>
  </g>
  
  <!-- Top Face Grid -->
  <g stroke="#a0aec0" stroke-width="0.5" opacity="0.4">
    <line x1="70" y1="47" x2="130" y2="82"/>
    <line x1="100" y1="30" x2="100" y2="100"/>
    <line x1="55" y1="65" x2="145" y2="65"/>
  </g>
  
  <!-- Quality Stamp -->
  <circle cx="100" cy="65" r="15" fill="none" stroke="#2A6B52" stroke-width="2"/>
  <text x="100" y="69" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#2A6B52" text-anchor="middle">A+</text>
</svg>
