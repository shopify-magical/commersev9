<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="latexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6d3"/>
      <stop offset="50%" style="stop-color:#e8d4b8"/>
      <stop offset="100%" style="stop-color:#d4c4a8"/>
    </linearGradient>
    <linearGradient id="containerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Container Body -->
  <ellipse cx="100" cy="160" rx="70" ry="20" fill="url(#containerGradient)" filter="url(#shadow)"/>
  <path d="M30 80 L30 150 Q30 170 100 170 Q170 170 170 150 L170 80" fill="url(#containerGradient)" filter="url(#shadow)"/>
  
  <!-- Container Rim -->
  <ellipse cx="100" cy="80" rx="70" ry="20" fill="#718096" stroke="#4a5568" stroke-width="2"/>
  <ellipse cx="100" cy="80" rx="60" ry="15" fill="#2d3748"/>
  
  <!-- Latex Liquid Surface -->
  <ellipse cx="100" cy="85" rx="55" ry="12" fill="url(#latexGradient)"/>
  
  <!-- Liquid Highlight -->
  <ellipse cx="85" cy="82" rx="20" ry="4" fill="rgba(255,255,255,0.4)"/>
  
  <!-- Container Label -->
  <rect x="50" y="110" width="100" height="30" rx="3" fill="#e2e8f0"/>
  <text x="100" y="130" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d3748" text-anchor="middle">LATEX</text>
  
  <!-- Measurement Lines -->
  <line x1="35" y1="100" x2="45" y2="100" stroke="#a0aec0" stroke-width="2"/>
  <line x1="35" y1="120" x2="45" y2="120" stroke="#a0aec0" stroke-width="2"/>
  <line x1="35" y1="140" x2="45" y2="140" stroke="#a0aec0" stroke-width="2"/>
</svg>
