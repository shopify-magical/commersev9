<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายละเอียดสินค้า - Sweet Layers</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2A6B52; --primary-dark: #1F4A3A; --primary-light: #E8F5F0;
      --accent: #C4A647; --accent-dark: #B3941A;
      --cream: #FDF9F5; --brown: #3D2E22; --brown-light: #5A4535;
      --gray-100: #F5EDE4; --gray-200: #E8DCD0; --gray-300: #D4C4B5;
      --gray-400: #B8A08A; --gray-500: #9A7D6A; --white: #ffffff;
      --shadow-sm: 0 1px 3px rgba(13,42,34,0.06);
      --shadow-md: 0 4px 16px rgba(13,42,34,0.08);
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
      --width-xl: 1280px;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--cream);
      color: var(--brown);
      line-height: 1.5;
    }
    
    /* Header */
    .header {
      position: sticky;
      top: 0;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      z-index: 100;
      padding: 12px 0;
    }
    .header-container {
      max-width: var(--width-xl);
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: var(--primary);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 24px;
    }
    .nav-links a {
      color: var(--brown);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .nav-links a:hover { color: var(--primary); }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .cart-btn {
      position: relative;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
    }
    .cart-badge {
      position: absolute;
      top: 0;
      right: 0;
      background: var(--accent);
      color: var(--white);
      font-size: 0.65rem;
      font-weight: 700;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Breadcrumb */
    .breadcrumb {
      max-width: var(--width-xl);
      margin: 0 auto;
      padding: 16px;
      font-size: 0.875rem;
      color: var(--gray-500);
    }
    .breadcrumb a {
      color: var(--brown);
      text-decoration: none;
    }
    .breadcrumb a:hover { color: var(--primary); }

    /* Product Detail */
    .product-detail {
      max-width: var(--width-xl);
      margin: 0 auto;
      padding: 0 16px 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }
    
    .product-images {
      position: sticky;
      top: 100px;
      height: fit-content;
    }
    .main-image {
      aspect-ratio: 1;
      background: var(--gray-100);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 12px;
    }
    .main-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .image-thumbs {
      display: flex;
      gap: 8px;
    }
    .image-thumbs img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: 2px solid transparent;
    }
    .image-thumbs img:hover,
    .image-thumbs img.active {
      border-color: var(--primary);
    }

    .product-info h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .product-meta {
      color: var(--gray-500);
      font-size: 0.9rem;
      margin-bottom: 16px;
    }
    .product-price {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 24px;
    }
    .product-desc {
      color: var(--gray-500);
      line-height: 1.7;
      margin-bottom: 24px;
    }
    
    .quantity-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .quantity-selector label {
      font-weight: 500;
    }
    .qty-btns {
      display: flex;
      align-items: center;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
    }
    .qty-btns button {
      width: 40px;
      height: 40px;
      border: none;
      background: var(--white);
      cursor: pointer;
      font-size: 1.25rem;
    }
    .qty-btns span {
      width: 50px;
      text-align: center;
      font-weight: 600;
    }

    .action-btns {
      display: flex;
      gap: 12px;
    }
    .btn {
      flex: 1;
      padding: 16px 24px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--primary);
      color: var(--white);
    }
    .btn-primary:hover {
      background: var(--primary-dark);
    }
    .btn-secondary {
      background: var(--gray-100);
      color: var(--brown);
    }
    .btn-secondary:hover {
      background: var(--gray-200);
    }

    /* Related Products */
    .related-section {
      max-width: var(--width-xl);
      margin: 0 auto;
      padding: 40px 16px;
      border-top: 1px solid var(--gray-200);
    }
    .related-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 24px;
    }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .related-card {
      background: var(--white);
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .related-card:hover {
      transform: translateY(-4px);
    }
    .related-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
    }
    .related-card-info {
      padding: 12px;
    }
    .related-card-name {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 4px;
    }
    .related-card-price {
      color: var(--primary);
      font-weight: 700;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--brown);
      color: var(--white);
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.875rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 768px) {
      .product-detail {
        grid-template-columns: 1fr;
      }
      .product-images {
        position: static;
      }
      .related-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-container">
      <a href="/" class="logo">
        <span>🍰</span>
        <span>Sweet Layers</span>
      </a>
      <nav class="nav-links">
        <a href="/">หน้าแรก</a>
        <a href="/shop.html">สินค้า</a>
        <a href="/about.html">เกี่ยวกับ</a>
        <a href="/contact.html">ติดต่อ</a>
      </nav>
      <div class="header-actions">
        <button class="cart-btn" onclick="location.href='/cart.html'">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="cart-badge" id="cartCount">0</span>
        </button>
        <a href="/login.html" style="font-size: 0.875rem; color: var(--brown); text-decoration: none;">เข้าสู่ระบบ</a>
      </div>
    </div>
  </header>

  <!-- Breadcrumb -->
  <nav class="breadcrumb">
    <a href="/">หน้าแรก</a> / <a href="/shop.html">สินค้า</a> / <span id="productName">รายละเอียด</span>
  </nav>

  <!-- Product Detail -->
  <main class="product-detail" id="productDetail">
    <!-- Content loaded by JS -->
  </main>

  <!-- Related Products -->
  <section class="related-section">
    <h2>สินค้าที่คุณอาจชอบ</h2>
    <div class="related-grid" id="relatedGrid">
      <!-- Loaded by JS -->
    </div>
  </section>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = window.location.hostname.includes('pages.dev')
      ? 'https://bizcommerz-agentic-engine.aekbuffalo.workers.dev'
      : window.location.origin;

    let cart = JSON.parse(localStorage.getItem('cart') || '[]');
    let currentQty = 1;

    const products = [
      { id: 1, name: 'มูนเค้กสัปปะรด', category: 'mooncakes', price: 89, image: 'images/mooncake-pineapple.jpg', desc: 'มูนเค้กไส้สัปปะรดแท้ 100% หวานหอม นุ่มละมุน สูตรต้นตำรับ', meta: '4 ชิ้น/กล่อง' },
      { id: 2, name: 'มูนเค้กทุเรียน', category: 'mooncakes', price: 129, image: 'images/mooncake-durian.jpg', desc: 'มูนเค้กไส้ทุเรียนหมอนทอง เนื้อนุ่ม หอมกลิ่นทุเรียน', meta: '4 ชิ้น/กล่อง' },
      { id: 3, name: 'ขนมเปี๊ยะไส้ถั่ว', category: 'pastries', price: 45, image: 'images/pastry-bean.jpg', desc: 'ขนมเปี๊ยะไส้ถั่วแดงกวน หวานกำลังดี เปลือกกรอบ', meta: '2 ชิ้น' },
      { id: 4, name: 'ขนมเปี๊ยะไส้เผือก', category: 'pastries', price: 55, image: 'images/pastry-taro.jpg', desc: 'ขนมเปี๊ยะไส้เผือกมันนุ่ม หอมกลิ่นเผือก', meta: '2 ชิ้น' },
      { id: 5, name: 'ขนมไข่ทองคำ', category: 'egg-yolk', price: 35, image: 'images/egg-gold.jpg', desc: 'ขนมไข่ทองคำกรอบนอกนุ่มใน', meta: '1 ชิ้น' },
      { id: 6, name: 'เค้กชาไทย', category: 'cakes', price: 299, image: 'images/cake-thai-tea.jpg', desc: 'เค้กชาไทยเนื้อนุ่ม ราดซอสชาไทยเข้มข้น', meta: '1 ปอนด์' },
      { id: 7, name: 'ชุดของขวัญสุดคุ้ม', category: 'bundles', price: 499, image: 'images/gift-bundle.jpg', desc: 'ชุดของขวัญรวมขนมยอดนิยม 8 ชิ้น บรรจุกล่องสวยงาม', meta: 'รวม 8 ชิ้น' },
      { id: 8, name: 'มูนเค้กรวมรส', category: 'mooncakes', price: 199, image: 'images/mooncake-mix.jpg', desc: 'มูนเค้กรวมรส 6 ชิ้น หลากหลายไส้ให้เลือกลิ้ม', meta: '6 ชิ้น/กล่อง' },
    ];

    function getProductId() {
      const params = new URLSearchParams(window.location.search);
      return parseInt(params.get('id')) || 1;
    }

    function renderProduct() {
      const id = getProductId();
      const product = products.find(p => p.id === id) || products[0];
      
      document.getElementById('productName').textContent = product.name;
      document.title = `${product.name} - Sweet Layers`;
      
      document.getElementById('productDetail').innerHTML = `
        <div class="product-images">
          <div class="main-image">
            <img src="${product.image}" alt="${product.name}" id="mainImage">
          </div>
          <div class="image-thumbs">
            <img src="${product.image}" class="active" onclick="changeImage(this.src)">
            <img src="images/heritage-bakery.jpg" onclick="changeImage(this.src)">
            <img src="images/black-sesame.jpg" onclick="changeImage(this.src)">
          </div>
        </div>
        <div class="product-info">
          <h1>${product.name}</h1>
          <div class="product-meta">${product.meta} | คงเหลือ: 50 ชิ้น</div>
          <div class="product-price">฿${product.price}</div>
          <p class="product-desc">${product.desc}</p>
          
          <div class="quantity-selector">
            <label>จำนวน:</label>
            <div class="qty-btns">
              <button onclick="changeQty(-1)">-</button>
              <span id="qtyValue">1</span>
              <button onclick="changeQty(1)">+</button>
            </div>
          </div>
          
          <div class="action-btns">
            <button class="btn btn-primary" onclick="addToCart()">เพิ่มลงตะกร้า</button>
            <button class="btn btn-secondary" onclick="buyNow()">ซื้อเลย</button>
          </div>
        </div>
      `;
      
      // Render related products (same category)
      const related = products.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
      document.getElementById('relatedGrid').innerHTML = related.map(p => `
        <div class="related-card" onclick="location.href='/product.html?id=${p.id}'">
          <img src="${p.image}" alt="${p.name}" loading="lazy">
          <div class="related-card-info">
            <div class="related-card-name">${p.name}</div>
            <div class="related-card-price">฿${p.price}</div>
          </div>
        </div>
      `).join('');
    }

    function changeImage(src) {
      document.getElementById('mainImage').src = src;
      document.querySelectorAll('.image-thumbs img').forEach(img => {
        img.classList.toggle('active', img.src === src);
      });
    }

    function changeQty(delta) {
      currentQty = Math.max(1, currentQty + delta);
      document.getElementById('qtyValue').textContent = currentQty;
    }

    function addToCart() {
      const id = getProductId();
      const product = products.find(p => p.id === id);
      const existing = cart.find(item => item.id === id);
      
      if (existing) {
        existing.qty += currentQty;
      } else {
        cart.push({ ...product, qty: currentQty });
      }
      
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartCount();
      showToast(`เพิ่ม ${product.name} x${currentQty} ลงตะกร้า`);
    }

    function buyNow() {
      addToCart();
      location.href = '/checkout.html';
    }

    function updateCartCount() {
      const count = cart.reduce((sum, item) => sum + item.qty, 0);
      document.getElementById('cartCount').textContent = count;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // Init
    renderProduct();
    updateCartCount();
  </script>
</body>
</html>
