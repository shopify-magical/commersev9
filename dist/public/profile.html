<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account - Sweet Layers</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2A6B52; --primary-dark: #1F4A3A; --primary-light: #E8F5F0;
      --accent: #C4A647; --accent-dark: #B3941A;
      --cream: #FDF9F5; --brown: #3D2E22; --brown-light: #5A4535;
      --gray-100: #F5EDE4; --gray-200: #E8DCD0; --gray-300: #D4C4B5;
      --gray-400: #B8A08A; --gray-500: #9A7D6A; --white: #ffffff;
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
    }
    html { font-size: 16px; }
    body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--brown); min-height: 100vh; }
    
    .header { background: var(--white); padding: 16px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--gray-200); }
    .back-btn { display: flex; align-items: center; gap: 8px; color: var(--brown); text-decoration: none; font-size: 0.9rem; }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--primary); }
    
    .container { max-width: 600px; margin: 0 auto; padding: 24px 16px; }
    
    .profile-header { text-align: center; margin-bottom: 32px; }
    .profile-avatar { width: 80px; height: 80px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .profile-avatar svg { width: 40px; height: 40px; color: #fff; }
    .profile-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; }
    .profile-email { color: var(--gray-500); font-size: 0.9rem; }
    
    .section { background: var(--white); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }
    .section-title { font-size: 1rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    
    .order-card { padding: 16px; background: var(--gray-100); border-radius: var(--radius-md); margin-bottom: 12px; }
    .order-id { font-size: 0.85rem; color: var(--gray-500); }
    .order-items { font-size: 0.9rem; margin: 8px 0; }
    .order-total { font-weight: 600; color: var(--primary); }
    .order-date { font-size: 0.8rem; color: var(--gray-500); }
    .order-status { display: inline-block; padding: 4px 12px; background: var(--primary-light); color: var(--primary); border-radius: 100px; font-size: 0.8rem; margin-top: 8px; }
    
    .address-card { padding: 16px; background: var(--gray-100); border-radius: var(--radius-md); margin-bottom: 12px; position: relative; }
    .address-card p { font-size: 0.9rem; line-height: 1.5; }
    .address-delete { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #999; cursor: pointer; font-size: 18px; }
    
    .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: var(--radius-md); font-size: 1rem; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline { background: none; border: 1px solid var(--gray-300); color: var(--brown); }
    .btn-danger { background: #fee; color: #c00; }
    
    .empty { text-align: center; padding: 32px; color: var(--gray-500); }
    
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); border-top: 1px solid var(--gray-200); display: flex; padding: 12px 0; justify-content: space-around; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--gray-500); text-decoration: none; font-size: 0.75rem; }
    .nav-item.active { color: var(--primary); }
    .nav-item svg { width: 24px; height: 24px; }
  </style>
</head>
<body>
  <header class="header">
    <a href="/index.html" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back
    </a>
    <div class="logo">Sweet Layers</div>
  </header>

  <main class="container">
    <div class="profile-header">
      <div class="profile-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="profile-name" id="memberName">Loading...</div>
      <div class="profile-email" id="memberEmail"></div>
    </div>

    <div class="section">
      <div class="section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Order History
      </div>
      <div id="ordersList"></div>
    </div>

    <div class="section">
      <div class="section-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Saved Addresses
      </div>
      <div id="addressesList"></div>
      <button class="btn btn-outline" onclick="showAddAddress()">+ Add New Address</button>
    </div>

    <div class="section">
      <button class="btn btn-danger" onclick="handleLogout()">Log Out</button>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="/index.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="/shop.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Shop
    </a>
    <a href="/cart.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Cart
    </a>
    <a href="/profile.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

  <script src="/js/member-system.js"></script>
  <script>
    const memberSystem = new MemberSystem();

    function init() {
      const member = memberSystem.getMember();
      if (!member || !member.email) {
        window.location.href = '/index.html';
        return;
      }

      document.getElementById('memberName').textContent = member.name || 'Customer';
      document.getElementById('memberEmail').textContent = member.email;

      loadOrders();
      loadAddresses();
    }

    async function loadOrders() {
      const orders = await memberSystem.getOrders();
      const container = document.getElementById('ordersList');
      
      if (!orders || orders.length === 0) {
        container.innerHTML = '<div class="empty">No orders yet</div>';
        return;
      }

      container.innerHTML = orders.slice(0, 5).map(order => `
        <div class="order-card">
          <div class="order-id">Order #${order.orderId || order.id || 'N/A'}</div>
          <div class="order-items">${order.items ? order.items.join(', ') : 'Items'}</div>
          <div class="order-total">฿${order.total || order.amount || 0}</div>
          <div class="order-date">${new Date(order.createdAt).toLocaleDateString()}</div>
          <span class="order-status">${order.status || 'Completed'}</span>
        </div>
      `).join('');
    }

    function loadAddresses() {
      const addresses = memberSystem.getAddresses();
      const container = document.getElementById('addressesList');
      
      if (!addresses || addresses.length === 0) {
        container.innerHTML = '<div class="empty">No saved addresses</div>';
        return;
      }

      container.innerHTML = addresses.map(addr => `
        <div class="address-card">
          <p>${addr.name}<br>${addr.detail}<br>${addr.phone}</p>
          <button class="address-delete" onclick="deleteAddress(${addr.id})">&times;</button>
        </div>
      `).join('');
    }

    function showAddAddress() {
      const detail = prompt('Address:');
      if (!detail) return;
      const name = prompt('Name:');
      const phone = prompt('Phone:');
      memberSystem.saveAddress({ name, detail, phone });
      loadAddresses();
    }

    function deleteAddress(id) {
      if (confirm('Delete this address?')) {
        memberSystem.deleteAddress(id);
        loadAddresses();
      }
    }

    function handleLogout() {
      memberSystem.logout();
      window.location.href = '/index.html';
    }

    init();
  </script>
</body>
</html>
