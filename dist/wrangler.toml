#:schema node_modules/wrangler/config-schema.json
name = "bizcommerz-agentic-engine"
main = "src/worker.ts"
compatibility_date = "2025-03-20"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
ENGINE_NAME = "BizCommerzAgenticEngine"
LOG_LEVEL = "info"
ENABLE_LEARNING = "true"

[[durable_objects.bindings]]
name = "ENGINE_STATE"
class_name = "EngineState"

[[kv_namespaces]]
binding = "USERS_KV"
id = "7ca5890396ba4c0f9925c1e6a64022a3"

[[kv_namespaces]]
binding = "TENANTS_KV"
id = "215cf74b290e4e0cadf708644c4929f8"

[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "2204631a5e8f4bfa86e964771b4120c9"

[[migrations]]
tag = "v2"
new_sqlite_classes = ["EngineState"]