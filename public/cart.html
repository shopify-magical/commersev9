<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตะกร้าสินค้า - Sweet Layers</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2A6B52; --primary-dark: #1F4A3A; --primary-light: #E8F5F0;
      --accent: #C4A647; --accent-dark: #B3941A;
      --cream: #FDF9F5; --brown: #3D2E22; --brown-light: #5A4535;
      --gray-100: #F5EDE4; --gray-200: #E8DCD0; --gray-300: #D4C4B5;
      --gray-400: #B8A08A; --gray-500: #9A7D6A; --white: #ffffff;
      --shadow-md: 0 4px 16px rgba(13,42,34,0.08);
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--cream);
      color: var(--brown);
      line-height: 1.5;
      min-height: 100vh;
    }
    
    /* Header */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      padding: 16px 0;
    }
    .header-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--brown);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: var(--primary);
    }

    /* Cart Container */
    .cart-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px;
    }
    .cart-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .cart-count {
      background: var(--primary-light);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.875rem;
      font-family: 'Inter', sans-serif;
    }

    /* Cart Items */
    .cart-items {
      background: var(--white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .cart-item {
      display: grid;
      grid-template-columns: 100px 1fr auto auto auto;
      gap: 16px;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--gray-100);
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: var(--radius-sm);
    }
    .item-info h3 {
      font-size: 1rem;
      margin-bottom: 4px;
    }
    .item-meta {
      font-size: 0.8rem;
      color: var(--gray-500);
    }
    .item-price {
      font-weight: 600;
      color: var(--primary);
    }
    .qty-control {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
    }
    .qty-control button {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--white);
      cursor: pointer;
      font-size: 1rem;
    }
    .qty-control span {
      min-width: 30px;
      text-align: center;
      font-weight: 600;
    }
    .remove-btn {
      color: var(--gray-400);
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
    }
    .remove-btn:hover { color: #DC2626; }

    /* Empty Cart */
    .empty-cart {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-cart-icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }
    .empty-cart h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .empty-cart p {
      color: var(--gray-500);
      margin-bottom: 24px;
    }

    /* Cart Summary */
    .cart-summary {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 24px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 0.95rem;
    }
    .summary-row.total {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      padding-top: 16px;
      border-top: 1px solid var(--gray-200);
      margin-top: 16px;
    }
    .checkout-btn {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: var(--radius-md);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.2s;
    }
    .checkout-btn:hover { background: var(--primary-dark); }
    .checkout-btn:disabled {
      background: var(--gray-300);
      cursor: not-allowed;
    }
    .continue-shopping {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: var(--brown);
      text-decoration: none;
    }
    .continue-shopping:hover { color: var(--primary); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--brown);
      color: var(--white);
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.875rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 600px) {
      .cart-item {
        grid-template-columns: 80px 1fr;
        grid-template-rows: auto auto;
      }
      .cart-item img { width: 80px; height: 80px; }
      .item-controls {
        grid-column: 1 / -1;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-container">
      <a href="/shop.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        เลือกสินค้าต่อ
      </a>
      <div class="logo">Sweet Layers</div>
      <div style="width: 60px;"></div>
    </div>
  </header>

  <!-- Cart -->
  <main class="cart-container">
    <h1 class="cart-title">
      ตะกร้าสินค้า
      <span class="cart-count" id="itemCount">0 ชิ้น</span>
    </h1>

    <div id="cartContent">
      <!-- Cart items loaded by JS -->
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');

    function renderCart() {
      const container = document.getElementById('cartContent');
      
      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-cart">
            <div class="empty-cart-icon">Cart</div>
            <h3>ตะกร้าว่างเปล่า</h3>
            <p>ยังไม่มีสินค้าในตะกร้า เลือกขนมอร่อยๆ กันเลย!</p>
            <a href="/shop.html" class="checkout-btn" style="display: inline-block; width: auto; padding: 12px 32px; text-decoration: none;">
              เลือกซื้อสินค้า
            </a>
          </div>
        `;
        document.getElementById('itemCount').textContent = '0 ชิ้น';
        return;
      }

      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      const shipping = subtotal > 500 ? 0 : 50;
      const total = subtotal + shipping;
      const itemCount = cart.reduce((sum, item) => sum + item.qty, 0);

      document.getElementById('itemCount').textContent = `${itemCount} ชิ้น`;

      container.innerHTML = `
        <div class="cart-items">
          ${cart.map((item, idx) => `
            <div class="cart-item">
              <img src="${item.image}" alt="${item.name}">
              <div class="item-info">
                <h3>${item.name}</h3>
                <div class="item-meta">${item.meta || ''}</div>
                <div class="item-price">฿${item.price}</div>
              </div>
              <div class="qty-control">
                <button onclick="updateQty(${idx}, -1)" aria-label="ลดจำนวน">-</button>
                <span>${item.qty}</span>
                <button onclick="updateQty(${idx}, 1)" aria-label="เพิ่มจำนวน">+</button>
              </div>
              <div style="font-weight: 600;">฿${(item.price * item.qty).toFixed(0)}</div>
              <button class="remove-btn" onclick="removeItem(${idx})" aria-label="ลบสินค้า">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                </svg>
              </button>
            </div>
          `).join('')}
        </div>

        <div class="cart-summary">
          <div class="summary-row">
            <span>ยอดสินค้า (${itemCount} ชิ้น)</span>
            <span>฿${subtotal.toFixed(0)}</span>
          </div>
          <div class="summary-row">
            <span>ค่าจัดส่ง ${shipping === 0 ? '(ฟรี!)' : ''}</span>
            <span>${shipping === 0 ? 'ฟรี' : '฿' + shipping}</span>
          </div>
          <div class="summary-row total">
            <span>ยอดรวมทั้งสิ้น</span>
            <span>฿${total.toFixed(0)}</span>
          </div>
          <button class="checkout-btn" onclick="goToCheckout()">
            ดำเนินการชำระเงิน →
          </button>
          <a href="/shop.html" class="continue-shopping">← เลือกสินค้าต่อ</a>
        </div>
      `;
    }

    function updateQty(idx, delta) {
      cart[idx].qty += delta;
      if (cart[idx].qty <= 0) {
        cart.splice(idx, 1);
      }
      saveCart();
      renderCart();
      showToast('อัพเดทตะกร้าแล้ว');
    }

    function removeItem(idx) {
      cart.splice(idx, 1);
      saveCart();
      renderCart();
      showToast('ลบสินค้าออกจากตะกร้า');
    }

    function saveCart() {
      localStorage.setItem('cart', JSON.stringify(cart));
      // Sync with other pages
      window.dispatchEvent(new StorageEvent('storage', { key: 'cart' }));
    }

    function goToCheckout() {
      if (cart.length === 0) {
        showToast('กรุณาเพิ่มสินค้าก่อนชำระเงิน');
        return;
      }
      location.href = '/checkout.html';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // Listen for cart updates from other pages
    window.addEventListener('storage', (e) => {
      if (e.key === 'cart') {
        cart = JSON.parse(localStorage.getItem('cart') || '[]');
        renderCart();
      }
    });

    // Init
    renderCart();
  </script>
  
  <footer style="background: var(--brown); color: var(--gray-300); padding: 40px 16px; text-align: center; margin-top: 40px;">
    <p style="margin-bottom: 8px;">🍰 Sweet Layers</p>
    <p style="font-size: 0.85rem;">
      <a href="/track.html" style="color: var(--accent);">ติดตามสถานะสั่งซื้อ</a> | 
      <a href="/contact.html" style="color: var(--gray-300);">ติดต่อเรา</a>
    </p>
  </footer>
</body>
</html>
