  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2A6B52; --primary-dark: #1F4A3A; --primary-light: #E8F5F0;
      --accent: #C4A647; --accent-dark: #B3941A;
      --cream: #FDF9F5; --brown: #3D2E22; --brown-light: #5A4535;
      --gray-100: #F5EDE4; --gray-200: #E8DCD0; --gray-300: #D4C4B5;
      --gray-400: #B8A08A; --gray-500: #9A7D6A; --white: #ffffff;
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--brown); }
    
    .header { background: var(--white); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; z-index: 100; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .back-btn { display: flex; align-items: center; gap: 8px; color: var(--brown); text-decoration: none; font-size: 0.9rem; }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--primary); }
    .lang-btn-group { display: flex; gap: 4px; }
    .lang-btn { padding: 6px 12px; background: var(--gray-100); border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.8rem; font-weight: 600; }
    .lang-btn.active { background: var(--primary); color: #fff; }
    
    .container { max-width: 800px; margin: 0 auto; padding: 24px 16px 100px; }
    h1 { font-family: 'Playfair Display', serif; font-size: 1.75rem; margin-bottom: 8px; }
    .subtitle { color: var(--gray-500); margin-bottom: 24px; }
    
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 600px) { .contact-grid { grid-template-columns: 1fr; } }
    
    .contact-card { background: var(--white); padding: 16px; border-radius: var(--radius-lg); }
    .contact-card h3 { font-size: 1rem; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
    .contact-card p { font-size: 0.9rem; line-height: 1.6; color: var(--brown-light); }
    .contact-card a { color: var(--primary); text-decoration: none; }
    
    .map-container { background: var(--white); padding: 16px; border-radius: var(--radius-lg); margin-bottom: 24px; }
    .map-frame { width: 100%; height: 250px; border-radius: var(--radius-md); overflow: hidden; }
    .map-frame iframe { width: 100%; height: 100%; border: 0; }
    
    .contact-form { background: var(--white); padding: 20px; border-radius: var(--radius-lg); }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 4px; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--gray-200); border-radius: var(--radius-md); font-size: 1rem; font-family: inherit; }
    .form-group textarea { min-height: 100px; resize: vertical; }
    
    .checkbox-group { display: flex; align-items: center; gap: 8px; margin: 12px 0; font-size: 0.85rem; }
    .checkbox-group a { color: var(--primary); }
    
    .btn-submit { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-md); font-size: 1rem; font-weight: 600; cursor: pointer; }
    
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); border-top: 1px solid var(--gray-200); display: flex; padding: 10px 0; justify-content: space-around; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; color: var(--gray-500); text-decoration: none; font-size: 0.7rem; }
    .nav-item.active { color: var(--primary); }
    .nav-item svg { width: 22px; height: 22px; }
  </style>

<body>
  <header class="header">
    <div class="header-left">
      <a href="index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </a>
      <div class="logo">Sweet Layers</div>
    </div>
    <div class="lang-btn-group">
      <button class="lang-btn active" id="btnTH" onclick="setLang('th')">TH</button>
      <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
    </div>
  </header>

  <main class="container">
    <h1>ติดต่อเรา</h1>
    <p class="subtitle">Sweet Layers Artisan Cake Shop</p>
    
    <div class="contact-grid">
      <div class="contact-card">
        <h3>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ที่อยู่
        </h3>
        <p>123 Bakery Street<br>Bangkok, Thailand 10110<br>
        <a href="tel:+66840871065">084 087 1065</a><br>
        <a href="mailto:hello@sweetlayers.com">hello@sweetlayers.com</a></p>
      </div>
      <div class="contact-card">
        <h3>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          เวลาทำการ
        </h3>
        <p>จันทร์ - ศุกร์: 8:00 - 20:00<br>
        เสาร์ - อาทิตย์: 8:00 - 21:00</p>
      </div>
    </div>
    
    <div class="map-container">
      <div class="map-frame">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3874.5!2d100.5!3d13.8!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!3m0!2m3!1e1!2f0!3e0!1m0!2e1!3e1" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>
    
    <h2 style="margin-bottom: 12px;">ส่งข้อความ</h2>
    <form class="contact-form" onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label>ชื่อ-นามสกุล</label>
        <input type="text" name="name" required>
      </div>
      <div class="form-group">
        <label>อีเมล</label>
        <input type="email" name="email" required>
      </div>
      <div class="form-group">
        <label>เบอร์โทรศัพท์</label>
        <input type="tel" name="phone">
      </div>
      <div class="form-group">
        <label>ข้อความ</label>
        <textarea name="message" required></textarea>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="privacy" required>
        <label for="privacy">ยอมรับ <a href="#">นโยบายความเป็นส่วนตัว</a></label>
      </div>
      <button type="submit" class="btn-submit">ส่งข้อความ</button>
    </form>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="shop.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span>Shop</span>
    </a>
    <a href="cart.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span>Cart</span>
    </a>
    <a href="#" class="nav-item" onclick="openProfile(); return false;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Login</span>
    </a>
  </nav>

  <script src="js/i18n.js"></script>
  <script src="js/member-system.js"></script>
  <script>
    function setLang(lang) {
      i18n.set(lang);
      document.getElementById('btnTH').classList.toggle('active', lang === 'th');
      document.getElementById('btnEN').classList.toggle('active', lang === 'en');
    }

    function openProfile() {
      const member = memberSystem.getMember();
      if (member && member.email) {
        window.location.href = 'profile.html';
      } else {
        showLoginModal();
      }
    }

    function handleSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const contacts = JSON.parse(localStorage.getItem('contacts') || '[]');
      contacts.unshift({
        name: form.name.value,
        email: form.email.value,
        phone: form.phone.value,
        message: form.message.value,
        createdAt: Date.now()
      });
      localStorage.setItem('contacts', JSON.stringify(contacts));
      alert('ส่งข้อความสำเร็จ! Thank you!');
      form.reset();
    }

    // Init lang
    setLang(i18n.getLang());
  </script>
</body>
