<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cakeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4A647;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A6B52;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#FDF9F5" stroke="#2A6B52" stroke-width="1"/>
  
  <!-- Mooncake shape -->
  <circle cx="16" cy="16" r="12" fill="url(#cakeGradient)"/>
  
  <!-- Mooncake pattern -->
  <rect x="12" y="12" width="8" height="8" fill="#FDF9F5" opacity="0.3" rx="1"/>
  <circle cx="16" cy="16" r="2" fill="#FDF9F5" opacity="0.5"/>
  
  <!-- Decorative elements -->
  <circle cx="10" cy="10" r="1" fill="#C4A647"/>
  <circle cx="22" cy="10" r="1" fill="#C4A647"/>
  <circle cx="10" cy="22" r="1" fill="#C4A647"/>
  <circle cx="22" cy="22" r="1" fill="#C4A647"/>
</svg>