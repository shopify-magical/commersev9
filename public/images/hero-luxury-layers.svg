<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Luxury Gradients -->
    <linearGradient id="goldLuxury" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#bc822a"/>
      <stop offset="100%" stop-color="#9c640a"/>
    </linearGradient>
    
    <linearGradient id="amberGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    
    <radialGradient id="centerGlow">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Luxury Filters -->
    <filter id="luxuryShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="12" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.15"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
      <feComponentTransfer>
        <feFuncA type="discrete" tableValues="0 0.5 0.5 0.5 0.5 0.5 0.5 0.5 0.5 0.5 0.5 0.5 0.5 0.5 0.5 0.5 0.5 0.5 0.5 0.5 0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="premiumBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5"/>
    </filter>
  </defs>
  
  <!-- Background Luxury Layers -->
  <rect width="1200" height="600" fill="url(#centerGlow)"/>
  
  <!-- Layer 1: Back Geometric Pattern -->
  <g opacity="0.1">
    <circle cx="200" cy="150" r="80" fill="none" stroke="url(#goldLuxury)" stroke-width="0.5"/>
    <circle cx="1000" cy="450" r="120" fill="none" stroke="url(#goldLuxury)" stroke-width="0.3"/>
    <path d="M50,300 Q150,250 250,300" fill="none" stroke="url(#amberGlow)" stroke-width="0.5"/>
    <path d="M950,200 Q1050,150 1150,200" fill="none" stroke="url(#amberGlow)" stroke-width="0.5"/>
  </g>
  
  <!-- Layer 2: Mid Luxury Elements -->
  <g opacity="0.2" filter="url(#softGlow)">
    <ellipse cx="300" cy="200" rx="60" ry="30" fill="url(#goldLuxury)" transform="rotate(25 300 200)"/>
    <ellipse cx="900" cy="400" rx="80" ry="40" fill="url(#amberGlow)" transform="rotate(-15 900 400)"/>
    <path d="M150,500 Q300,450 450,500 T750,500" fill="none" stroke="url(#goldLuxury)" stroke-width="1"/>
  </g>
  
  <!-- Layer 3: Front Premium Elements -->
  <g opacity="0.3" filter="url(#luxuryShadow)">
    <rect x="100" y="100" width="200" height="100" rx="15" fill="url(#goldLuxury)" opacity="0.8"/>
    <rect x="900" y="350" width="180" height="120" rx="12" fill="url(#amberGlow)" opacity="0.7"/>
    
    <!-- Luxury Decorative Elements -->
    <circle cx="200" cy="150" r="3" fill="#f59e0b"/>
    <circle cx="300" cy="200" r="2" fill="#d4af37"/>
    <circle cx="900" cy="400" r="3" fill="#f59e0b"/>
    <circle cx="1000" cy="450" r="2" fill="#d4af37"/>
  </g>
  
  <!-- Layer 4: Textured Overlay -->
  <g opacity="0.15">
    <pattern id="luxuryTexture" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="url(#goldLuxury)" opacity="0.5"/>
    </pattern>
    <rect width="1200" height="600" fill="url(#luxuryTexture)"/>
  </g>
  
  <!-- Layer 5: Light Effects -->
  <g opacity="0.25">
    <ellipse cx="600" cy="100" rx="200" ry="50" fill="url(#centerGlow)" filter="url(#premiumBlur)"/>
    <ellipse cx="400" cy="500" rx="150" ry="40" fill="url(#centerGlow)" filter="url(#premiumBlur)"/>
    <ellipse cx="800" cy="200" rx="180" ry="45" fill="url(#centerGlow)" filter="url(#premiumBlur)"/>
  </g>
  
  <!-- Layer 6: Accent Lines -->
  <g opacity="0.2" stroke="url(#goldLuxury)" stroke-width="0.5" fill="none">
    <path d="M0,300 L1200,300" opacity="0.3"/>
    <path d="M600,0 L600,600" opacity="0.3"/>
    <path d="M200,0 L200,600" opacity="0.2"/>
    <path d="M1000,0 L1000,600" opacity="0.2"/>
  </g>
</svg>
