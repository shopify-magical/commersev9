<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="rubberSheetGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7fafc"/>
      <stop offset="50%" style="stop-color:#edf2f7"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="sheetEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#cbd5e0"/>
      <stop offset="100%" style="stop-color:#a0aec0"/>
    </linearGradient>
    <filter id="sheetShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Rubber Sheet Stack -->
  <g filter="url(#sheetShadow)">
    <!-- Bottom Sheet -->
    <path d="M20 100 L40 60 L160 60 L180 100 L160 140 L40 140 Z" fill="url(#rubberSheetGradient)" stroke="url(#sheetEdge)" stroke-width="1"/>
    
    <!-- Middle Sheet -->
    <path d="M25 95 L45 55 L165 55 L185 95 L165 135 L45 135 Z" fill="url(#rubberSheetGradient)" stroke="url(#sheetEdge)" stroke-width="1"/>
    
    <!-- Top Sheet -->
    <path d="M30 90 L50 50 L170 50 L190 90 L170 130 L50 130 Z" fill="url(#rubberSheetGradient)" stroke="url(#sheetEdge)" stroke-width="2"/>
  </g>
  
  <!-- Sheet Texture Lines -->
  <g stroke="#cbd5e0" stroke-width="0.5" opacity="0.5">
    <line x1="55" y1="60" x2="55" y2="120"/>
    <line x1="75" y1="55" x2="75" y2="125"/>
    <line x1="95" y1="52" x2="95" y2="128"/>
    <line x1="115" y1="52" x2="115" y2="128"/>
    <line x1="135" y1="55" x2="135" y2="125"/>
    <line x1="155" y1="60" x2="155" y2="120"/>
    <line x1="175" y1="70" x2="175" y2="110"/>
  </g>
  
  <!-- Highlight on Top Sheet -->
  <path d="M50 50 L80 50 L75 55 L50 55 Z" fill="rgba(255,255,255,0.6)"/>
  
  <!-- Rubber Quality Label -->
  <rect x="80" y="85" width="60" height="20" rx="2" fill="#2A6B52"/>
  <text x="110" y="99" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">PREMIUM</text>
</svg>
