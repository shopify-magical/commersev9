<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - Sweet Layers</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #2A6B52;
      --primary-dark: #1F4A3A;
      --primary-light: #E8F5F0;
      --accent: #C4A647;
      --cream: #FDF9F5;
      --brown: #3D2E22;
      --brown-light: #5A4535;
      --gray-100: #F5EDE4;
      --gray-200: #E8DCD0;
      --gray-300: #D4C4B5;
      --gray-400: #B8A08A;
      --gray-500: #9A7D6A;
      --white: #ffffff;
      --error: #DC2626;
      --error-light: #FEE2E2;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-md: 0 4px 16px rgba(13,42,34,0.08);
      --shadow-lg: 0 8px 30px rgba(13,42,34,0.12);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      padding: 40px 32px;
      text-align: center;
      color: var(--white);
    }

    .login-header .logo {
      width: 64px;
      height: 64px;
      background: var(--white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 2rem;
    }

    .login-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .login-header p {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .login-body {
      padding: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--brown);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-md);
      font-size: 1rem;
      transition: all 0.2s;
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .form-group input.error {
      border-color: var(--error);
      background: var(--error-light);
    }

    .error-message {
      color: var(--error);
      font-size: 0.875rem;
      margin-top: 6px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .login-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 0.875rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--brown-light);
      cursor: pointer;
    }

    .remember-me input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .forgot-password {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-password:hover {
      text-decoration: underline;
    }

    .btn {
      width: 100%;
      padding: 14px 24px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--white);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      background: var(--gray-300);
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: var(--gray-100);
      color: var(--brown);
      margin-top: 12px;
    }

    .btn-secondary:hover {
      background: var(--gray-200);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--gray-400);
      font-size: 0.875rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }

    .divider span {
      padding: 0 16px;
    }

    .social-login {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn-social {
      padding: 12px;
      border: 2px solid var(--gray-200);
      background: var(--white);
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-social:hover {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .signup-prompt {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--gray-200);
      color: var(--gray-500);
      font-size: 0.875rem;
    }

    .signup-prompt a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    .signup-prompt a:hover {
      text-decoration: underline;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--white);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--brown);
      color: var(--white);
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.875rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
      box-shadow: var(--shadow-lg);
      max-width: 90vw;
    }
    
    .toast.success {
      background: var(--primary);
    }
    
    .toast.error {
      background: var(--error);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 480px) {
      .login-container {
        max-width: 100%;
      }
      
      .social-login {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="logo">🍰</div>
      <h1>Sweet Layers</h1>
      <p>เข้าสู่ระบบร้านค้าของคุณ</p>
    </div>

    <div class="login-body">
      <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
          <label for="email">อีเมลหรือเบอร์โทรศัพท์</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="example@email.com หรือ 08xxxxxxxx"
            required
            autocomplete="email"
            aria-describedby="emailError"
            aria-invalid="false"
          >
          <div class="error-message" id="emailError">กรุณากรอกอีเมลหรือเบอร์โทรศัพท์</div>
        </div>

        <div class="form-group">
          <label for="password">รหัสผ่าน</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="••••••••"
            required
            autocomplete="current-password"
            aria-describedby="passwordError"
            aria-invalid="false"
            minlength="6"
          >
          <div class="error-message" id="passwordError">รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร</div>
        </div>

        <div class="login-options">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe" name="rememberMe">
            <span>จดจำฉัน</span>
          </label>
          <a href="#" class="forgot-password" onclick="showToast('ติดต่อแอดมินเพื่อรีเซ็ตรหัสผ่าน')">ลืมรหัสผ่าน?</a>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn" aria-label="เข้าสู่ระบบ">
          <span class="btn-text">เข้าสู่ระบบ</span>
        </button>
      </form>

      <div class="divider">
        <span>หรือ</span>
      </div>

      <div class="social-login">
        <button class="btn-social" onclick="socialLogin('line')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#06C755"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
          LINE
        </button>
        <button class="btn-social" onclick="socialLogin('google')">
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
      </div>

      <div class="signup-prompt">
        ยังไม่มีบัญชี? <a href="/register.html">สมัครสมาชิก</a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/shared.js"></script>
  <script src="js/analytics.js"></script>
  <script>
    const API_BASE = window.location.hostname.includes('pages.dev')
      ? 'https://bizcommerz-agentic-engine.aekbuffalo.workers.dev'
      : window.location.origin;

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Enhanced validation functions
    function validateEmail(email) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRegex.test(email);
    }
    
    function validatePassword(password) {
      // At least 6 chars, 1 letter, 1 number
      const hasLetter = /[a-zA-Z]/.test(password);
      const hasNumber = /[0-9]/.test(password);
      return password.length >= 6 && hasLetter && hasNumber;
    }
    
    function generateDeviceFingerprint() {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      ctx.text('Device fingerprint', 12, 'Arial');
      const fingerprint = canvas.toDataURL();
      return btoa(fingerprint).substring(0, 16);
    }
    
    function getLoginErrorMessage(errorCode) {
      const errorMessages = {
        'invalid_credentials': 'อีเมลหรือรหัสผ่านไม่ถูกต้อง',
        'account_locked': 'บัญชีผู้ใช้ถูกล็อคชั่วคราง',
        'rate_limit': 'กรุณารอ 5 นาทีแล้วลองใหม่',
        'server_error': 'ข้อผิดพลาดจากเซิร์ฟเวอร์ กรุณาลองใหม่',
        'network_error': 'ไม่สามารถเชื่อมต่ออินเทอร์เน็ต'
      };
      return errorMessages[errorCode] || 'เกิดข้อผิดที่ไม่ทราบสาเหตุ';
    }
    
    // Loading state management
    function showLoadingState(button, message) {
      button.disabled = true;
      button.innerHTML = `<span class="loading"></span> ${message}`;
    }
    
    function hideLoadingState(button) {
      button.disabled = false;
      button.textContent = 'เข้าสู่ระบบ';
    }

    // Enhanced validation
    function validateForm() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let hasError = false;
      
      // Reset all errors first
      document.querySelectorAll('.form-group input').forEach(input => {
        input.classList.remove('error');
      });
      document.querySelectorAll('.error-message').forEach(msg => {
        msg.classList.remove('show');
      });
      
      // Enhanced email validation
      if (!email) {
        showFieldError('email', 'กรุณากรอกอีเมลหรือเบอร์โทรศัพท์');
        hasError = true;
      } else if (!validateEmail(email)) {
        showFieldError('email', 'รูปแบบอีเมลหรือเบอร์ไม่ถูกต้อง');
        hasError = true;
      }
      
      // Enhanced password validation
      if (!password) {
        showFieldError('password', 'กรุณากรอกรหัสผ่าน');
        hasError = true;
      } else if (password.length < 6) {
        showFieldError('password', 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร');
        hasError = true;
      } else if (!validatePassword(password)) {
        showFieldError('password', 'รหัสผ่านต้องมีทั้งตัวอักษรและตัวเลข');
        hasError = true;
      }
      
      return !hasError;
    }
    
    function showFieldError(fieldId, message) {
      const field = document.getElementById(fieldId);
      const errorElement = document.getElementById(fieldId + 'Error');
      field.classList.add('error');
      errorElement.textContent = message;
      errorElement.classList.add('show');
      
      // Track validation error for analytics
      if (typeof trackEvent === 'function') {
        trackEvent('login_validation_error', { field: fieldId, message });
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      
      // Track login attempt
      if (typeof trackEvent === 'function') {
        trackEvent('login_attempt', { method: 'email' });
      }
      
      if (!validateForm()) return;
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;
      const btn = document.getElementById('loginBtn');

      // Loading state with animation
      showLoadingState(btn, 'กำลังเข้าสู่ระบบ...');

      try {
        // Enhanced API call with timeout and retry
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000);
        
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'X-Requested-With': 'XMLHttpRequest'
          },
          body: JSON.stringify({ 
            email, 
            password, 
            rememberMe,
            deviceFingerprint: generateDeviceFingerprint(),
            timestamp: Date.now()
          }),
          signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        const data = await response.json();

        if (data.success) {
          // Determine user role based on email
          let userRole = 'customer';
          const emailLower = email.toLowerCase();
          if (emailLower.includes('admin')) userRole = 'admin';
          else if (emailLower.includes('owner') || emailLower.includes('vendor')) userRole = 'owner';
          else if (emailLower.includes('business')) userRole = 'business';
          
          // Set role in user object
          const userData = { ...data.user, role: userRole };
          
          // Enhanced token storage
          const storage = rememberMe ? localStorage : sessionStorage;
          storage.setItem('auth_token', data.token);
          storage.setItem('user', JSON.stringify(userData));
          storage.setItem('login_timestamp', Date.now().toString());
          
          // Track successful login
          if (typeof trackEvent === 'function') {
            trackEvent('login_success', { 
              userId: data.user.id,
              method: 'email',
              rememberMe,
              userRole
            });
          }
          
          showToast('เข้าสู่ระบบสำเร็จ!', 'success');
          
          // Role-based redirect
          let redirectTo = '/dashboard.html';
          if (userRole === 'admin') redirectTo = '/super-admin.html';
          else if (userRole === 'owner') redirectTo = '/cake-shop-owner.html';
          else if (userRole === 'business') redirectTo = '/dashboard.html';
          
          // Smooth redirect with loading state
          showLoadingState(btn, 'กำลังนำทาง...');
          setTimeout(() => {
            window.location.href = redirectTo;
          }, 800);
        } else {
          // Enhanced error handling
          const errorMessage = getLoginErrorMessage(data.error || 'invalid_credentials');
          showToast(errorMessage, 'error');
          
          // Track failed login
          if (typeof trackEvent === 'function') {
            trackEvent('login_failed', { 
              error: data.error,
              email: email.substring(0, 3) + '***' // Partial masking for privacy
            });
          }
          
          hideLoadingState(btn);
        }
      } catch (error) {
        console.error('Login error:', error);
        showToast('การเชื่อมต่อขัดข้อผิดพลาด กรุณาลองใหม่', 'error');
        
        // Track network error
        if (typeof trackEvent === 'function') {
          trackEvent('login_network_error', { error: error.message });
        }
        
        hideLoadingState(btn);
      }
    }

    function socialLogin(provider) {
      // Track social login attempt
      if (typeof trackEvent === 'function') {
        trackEvent('social_login_attempt', { provider });
      }
      
      showToast(`กำลังเชื่อมต่อกับ ${provider}...`);
      
      // OAuth implementation would go here
      // For demo: simulate successful login
      setTimeout(() => {
        const mockUser = {
          id: 'demo_user',
          name: provider === 'line' ? 'LINE User' : 'Google User',
          email: `user@${provider}.com`,
          avatar: `https://ui-avatars.com/api/?name=${provider}&background=random`
        };
        
        const storage = localStorage;
        storage.setItem('auth_token', 'demo_token_' + provider);
        storage.setItem('user', JSON.stringify(mockUser));
        
        if (typeof trackEvent === 'function') {
          trackEvent('social_login_success', { provider });
        }
        
        showToast(`เข้าสู่ระบบด้วย ${provider}!`, 'success');
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 1000);
      }, 1500);
    }

    function openOnboardFromLogin(event) {
      event.preventDefault();
      
      // Track onboarding click
      if (typeof trackEvent === 'function') {
        trackEvent('onboarding_click', { source: 'login_page' });
      }
      
      window.location.href = '/?onboard=true';
    }

    // Check if already logged in and redirect appropriately
    const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
    const user = token ? JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user')) : null;
    
    if (token && user) {
      // Track auto-redirect
      if (typeof trackEvent === 'function') {
        trackEvent('auto_redirect', { 
          reason: 'already_logged_in',
          userRole: user.role || 'customer'
        });
      }
      
      // Check user role for appropriate redirect
      // Owner (vendor) → cake-shop-owner.html (full business management)
      // Business (user) → dashboard.html (order tracking)
      // Admin → super-admin.html (system admin)
      const redirectPath = user.role === 'admin' ? '/super-admin.html' : 
                        user.role === 'owner' || user.role === 'vendor' ? '/cake-shop-owner.html' : 
                        user.role === 'business' ? '/dashboard.html' : 
                        '/dashboard.html';
      
      window.location.href = redirectPath;
    }
  </script>
</body>
</html>
