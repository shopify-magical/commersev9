<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Sweet Layers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FDF9F5;
      color: #2A2A2A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      background: #2A6B52;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 60px;
      height: 60px;
      fill: #FDF9F5;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #2A6B52;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #666;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #2A6B52;
      color: #FDF9F5;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      transition: background 0.2s, transform 0.2s;
    }
    .btn:hover {
      background: #234A3A;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry — your order is saved and will be processed once you're back online.</p>
    <a href="/" class="btn">Try Again</a>
  </div>
</body>
</html>
